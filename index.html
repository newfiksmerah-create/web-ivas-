<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVAS OTP SMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <i class="fas fa-shield-alt shield-icon"></i>
                <h1>IVAS OTP SMS</h1>
                <p>Masuk dengan akun IVAS Anda</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Username IVAS" 
                        required
                    >
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Password" 
                        required
                    >
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Masuk</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="otp-section" id="otpSection" style="display: none;">
                <div class="divider">
                    <span>Verifikasi OTP</span>
                </div>
                
                <div class="otp-container">
                    <div class="otp-input-wrapper">
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 0)"
                        >
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 1)"
                        >
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 2)"
                        >
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 3)"
                        >
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 4)"
                        >
                        <input 
                            type="text" 
                            class="otp-input" 
                            maxlength="1" 
                            pattern="[0-9]"
                            inputmode="numeric"
                            onkeyup="moveToNext(this, 5)"
                        >
                    </div>
                    
                    <button class="verify-btn" id="verifyBtn" disabled>
                        <span>Verifikasi OTP</span>
                        <i class="fas fa-check-circle"></i>
                    </button>
                    
                    <div class="timer-section">
                        <span id="timerText">Kirim ulang OTP dalam </span>
                        <span id="timer">60</span>
                        <span>detik</span>
                    </div>
                    
                    <button class="resend-btn" id="resendBtn" style="display: none;">
                        <i class="fas fa-redo-alt"></i>
                        <span>Kirim Ulang OTP</span>
                    </button>
                </div>
            </div>

            <div class="alert" id="alert"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
